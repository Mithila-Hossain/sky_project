<!--
Author: Ghoufran Al-Kooh
Feature: Draft Messages page
Description: Displays saved draft messages with edit functionality which redirects to Send Message page
-->

<style>



.message-card {
        padding: 10px;
        margin: 20px;
        border-radius: 10px;
        box-shadow: 0 8px 6px rgba(22, 137, 190, 0.2);
        transition: 0.4s;
        cursor: pointer;
    }
    
    .message-card:hover {
        background: #e9f1fb;
    }
    .draft-actions {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .edit-btn {
       border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            background: rgba(11, 170, 249, 0.25);
            margin: 10px;
            box-shadow: 0 5px 6px rgba(2, 25, 44, 0.2);
            font-size: 12px;
            
    }

        .edit-btn:hover{

            background: rgb(124, 193, 254);
        }



   
</style>




<h1>Drafts</h1>

{% if draft_messages %}
{% for msg in draft_messages %}
<div class="message-card" onclick="showMessage(this)">

    <div class="message-header">

        <!-- LEFT -->
        <div>
            <strong>{{ msg.subject }}</strong><br>
            To: {{ msg.receiver.username }}
        </div>

        <!-- RIGHT -->
        <div class="draft-actions">

            <a href="?view=send&edit={{ msg.id }}" onclick="event.stopPropagation()">
                <button class="edit-btn">Edit</button>
            </a>

            <span class="date">{{ msg.timeStamp }}</span>
        </div>

    </div>

    <!-- PREVIEW -->
    <p class="message-preview">
        {{ msg.body|truncatechars:50 }}
    </p>

    <!-- FULL -->
    <p class="message-full" style="display:none;">
        {{ msg.body }}
    </p>




</div>
{% endfor %}
{% else %}
<p>No drafts yet</p>
{% endif %}
