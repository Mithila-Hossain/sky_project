

<style>
    .message-card {
        background: white;
        padding: 10px;
        margin: 20px;
        border-radius: 10px;
        box-shadow: 0 3px 6px rgba(0, 117, 149, 0.2);
        transition: 0.4s;
        cursor: pointer;
    }
    
    .message-card:hover {
        background: #eef8fc;
    }
    
    .message-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
    }
    
    .date {
        font-size: 12px;
        color: gray;
    }
    
    .message-preview {
        margin-top: 10px;
    }
    
    .message-full {
        display: none;
        margin-top: 10px;
    }









    .reply-btn {
    display: inline-block;
    margin-top: 10px;
    padding: 5px 10px;
    background: #bfe2f7;
    color: white;
    border-radius: 5px;
    text-decoration: none;
    font-size: 14px;
    box-shadow: 0px 2px 4px #44a8de;
}

.reply-btn:hover {
    background: #0168a0;
}


    </style>
    
    <h1>Inbox</h1>
    
    {% if messages %}
      {% for msg in messages %}
        <div class="message-card" onclick="showMessage(this)">
            <div class="message-header">
                <div>
                    <strong>{{ msg.subject }}</strong><br>
                    From: {{ msg.sender.username }}
                </div>
                <span class="date">{{ msg.timeStamp }}</span>
            </div>
    
            <p class="message-preview">
                {{ msg.body|truncatechars:50 }}
            </p>
    
            <p class="message-full">
                {{ msg.body }}
            </p>




            <a href="?view=send&reply_to={{ msg.sender.id }}" class="reply-btn">Reply</a>



        </div>
      {% endfor %}

      
    {% else %}
      <p>No messages yet</p>
    {% endif %}
