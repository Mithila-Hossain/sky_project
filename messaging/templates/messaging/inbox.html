<h2>Inbox</h2>

{% if messages %}
    <ul>
    {% for msg in messages %}
        <li>
            {{ msg.timeStamp }} | 
            From: {{ msg.sender.username }} | 
            {{ msg.subject }} - {{ msg.body }}
        </li>
    {% endfor %}
    </ul>
{% else %}
    <p>No messages yet</p>
{% endif %}








<div>
    <a href="/messaging/inbox/">Inbox</a> |
    <a href="/messaging/send/">Send Message</a>
</div>
<hr>
