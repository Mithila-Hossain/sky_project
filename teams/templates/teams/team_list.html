{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="container py-5">

    <h1 class="mb-4 text-primary fw-bold">Teams Directory</h1>

    <form method="GET" class="mb-4">
        <div class="input-group">
            <input type="text" name="search" class="form-control" placeholder="Search teams..." value="{{ search_query }}">
            <button class="btn btn-primary">Search</button>
        </div>
    </form>

    <div class="card shadow-sm">
        <div class="card-body">

            {% if teams %}
                <ul class="list-group">
                    {% for team in teams %}
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <span class="fw-semibold">{{ team.name }}</span>
                            <a href="{% url 'team_detail' team.id %}" class="btn btn-sm btn-outline-primary">View</a>
                        </li>
                    {% endfor %}
                </ul>
            {% else %}
                <p class="text-muted">No teams found.</p>
            {% endif %}

        </div>
    </div>

</div>

{% endblock %}
