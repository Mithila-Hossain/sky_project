{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="container py-5" style="max-width: 720px;">

    <!-- Header -->
    <div class="d-flex align-items-center justify-content-between mb-4">
        <h1 style="font-weight:800; color:#003B70; margin:0;">
            Email {{ team.name }}
        </h1>

        <a href="{% url 'team_detail' team.id %}"
           style="text-decoration:none; font-size:14px; color:#0078D4; font-weight:600;">
            ← Back to Team
        </a>
    </div>

    <!-- Card -->
    <div style="
        background:white;
        border-radius:18px;
        padding:28px;
        border:1px solid #E4E9F2;
        box-shadow:0 4px 14px rgba(0,0,0,0.06);
    ">

        <form method="POST">
            {% csrf_token %}

            <!-- Subject -->
            <div class="mb-4">
                <label class="form-label" style="font-weight:700; color:#003B70;">Subject</label>
                <input type="text" name="subject" class="form-control"
                       style="padding:12px; border-radius:10px; border:1px solid #D6DCE5;"
                       placeholder="Enter subject..." required>
            </div>

            <!-- Message -->
            <div class="mb-4">
                <label class="form-label" style="font-weight:700; color:#003B70;">Message</label>
                <textarea name="body" class="form-control" rows="7"
                          style="padding:12px; border-radius:10px; border:1px solid #D6DCE5;"
                          placeholder="Write your message..." required></textarea>
            </div>

            <!-- Footer -->
            <div class="d-flex justify-content-end">
                <button class="btn"
                        style="
                            background:#0078D4;
                            color:white;
                            padding:10px 22px;
                            font-weight:600;
                            border-radius:10px;
                            box-shadow:0 2px 6px rgba(0,0,0,0.1);
                        ">
                    Send Email
                </button>
            </div>

        </form>

    </div>

</div>

{% endblock %}
