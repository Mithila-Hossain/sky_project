{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="container py-5">

    <h1 class="text-primary fw-bold mb-4">Email {{ team.name }}</h1>

    <div class="mb-4">
        <a href="{% url 'team_detail' team.id %}" class="btn btn-outline-secondary btn-sm">← Back to Team</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-semibold">Subject</label>
                    <input type="text" name="subject" class="form-control" placeholder="Enter subject..." required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Message</label>
                    <textarea name="body" class="form-control" rows="6" placeholder="Write your message..." required></textarea>
                </div>

                <button class="btn btn-primary">Send Email</button>
            </form>

        </div>
    </div>

</div>

{% endblock %}
