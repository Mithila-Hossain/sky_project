{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="container py-5" style="max-width: 720px;">

    <!-- Header -->
    <div class="d-flex align-items-center justify-content-between mb-4" style="gap:10px;">

        <h2 style="font-weight:700; color:#003B70; margin:0; font-size:26px;">
            Schedule Meeting — {{ team.name }}
        </h2>
    
        <a href="{% url 'team_detail' team.id %}"
           style="text-decoration:none; font-size:14px; color:#0078D4; font-weight:600; white-space:nowrap;">
            ← Back to Team
        </a>
    
    </div>
    

    <!-- Card -->
    <div style="
        background:white;
        border-radius:18px;
        padding:28px;
        border:1px solid #E4E9F2;
        box-shadow:0 4px 14px rgba(0,0,0,0.06);
    ">

        <form method="POST">
            {% csrf_token %}

            <!-- Date & Time -->
            <div class="mb-4">
                <label class="form-label" style="font-weight:700; color:#003B70;">Date & Time</label>
                <input type="datetime-local" name="date_time" class="form-control"
                       style="padding:12px; border-radius:10px; border:1px solid #D6DCE5;"
                       required>
            </div>

            <!-- Platform -->
            <div class="mb-4">
                <label class="form-label" style="font-weight:700; color:#003B70;">Platform</label>
                <select name="platform" class="form-select"
                        style="padding:12px; border-radius:10px; border:1px solid #D6DCE5;"
                        required>
                    <option value="Teams">Microsoft Teams</option>
                    <option value="Zoom">Zoom</option>
                    <option value="Google Meet">Google Meet</option>
                    <option value="In Person">In Person</option>
                </select>
            </div>

            <!-- Agenda -->
            <div class="mb-4">
                <label class="form-label" style="font-weight:700; color:#003B70;">Agenda</label>
                <textarea name="agenda" class="form-control" rows="5"
                          style="padding:12px; border-radius:10px; border:1px solid #D6DCE5;"
                          placeholder="Meeting agenda..." required></textarea>
            </div>

            <!-- Schedule Type -->
            <div class="mb-4">
                <label class="form-label" style="font-weight:700; color:#003B70;">Schedule Type</label>
                <select name="schedule_type" class="form-select"
                        style="padding:12px; border-radius:10px; border:1px solid #D6DCE5;"
                        required>
                    <option value="One-off">One-off Meeting</option>
                    <option value="Recurring">Recurring Meeting</option>
                </select>
            </div>

            <!-- Footer -->
            <div class="d-flex justify-content-end">
                <button class="btn"
                        style="
                            background:#0078D4;
                            color:white;
                            padding:10px 22px;
                            font-weight:600;
                            border-radius:10px;
                            box-shadow:0 2px 6px rgba(0,0,0,0.1);
                        ">
                    Schedule Meeting
                </button>
            </div>

        </form>

    </div>

</div>

{% endblock %}
