{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="container py-5">

    <h1 class="text-success fw-bold mb-4">Schedule Meeting for {{ team.name }}</h1>

    <div class="mb-4">
        <a href="{% url 'team_detail' team.id %}" class="btn btn-outline-secondary btn-sm">← Back to Team</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-semibold">Date & Time</label>
                    <input type="datetime-local" name="date_time" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Platform</label>
                    <select name="platform" class="form-select" required>
                        <option value="Teams">Microsoft Teams</option>
                        <option value="Zoom">Zoom</option>
                        <option value="Google Meet">Google Meet</option>
                        <option value="In Person">In Person</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Agenda</label>
                    <textarea name="agenda" class="form-control" rows="4" placeholder="Meeting agenda..." required></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Schedule Type</label>
                    <select name="schedule_type" class="form-select" required>
                        <option value="One-off">One-off Meeting</option>
                        <option value="Recurring">Recurring Meeting</option>
                    </select>
                </div>

                <button class="btn btn-success">Schedule Meeting</button>
            </form>

        </div>
    </div>

</div>

{% endblock %}
