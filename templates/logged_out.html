<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signed Out – OpenSky</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --sky-blue: #00AEEF;
            --deep-purple: #6A4FBF;
            --cloud-white: #F5F9FF;
        }

        body {
            background: var(--cloud-white);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .logout-card {
            width: 420px;
            background: white;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.12);
            text-align: center;
        }

        .title {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--sky-blue), var(--deep-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-sky {
            background: linear-gradient(135deg, var(--sky-blue), var(--deep-purple));
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            margin-top: 20px;
        }

        .btn-sky:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="logout-card">

    <div class="title">You've been signed out.</div>

    <p class="text-muted">
        Your session has ended for security reasons.
    </p>

    <a href="{% url 'login' %}">
        <button class="btn-sky">Log back in</button>
    </a>

</div>

</body>
</html>
