<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenSky – Sign In</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --sky-blue: #00AEEF;
            --deep-purple: #6A4FBF;
            --cloud-white: #F5F9FF;
        }

        body {
            background: var(--cloud-white);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .login-card {
            width: 400px;
            background: white;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.12);
        }

        .brand-title {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            background: linear-gradient(135deg, var(--sky-blue), var(--deep-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }

        .btn-sky {
            background: linear-gradient(135deg, var(--sky-blue), var(--deep-purple));
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            margin-top: 10px;
        }

        .btn-sky:hover {
            opacity: 0.9;
        }

        .social-btn {
            width: 48%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: white;
        }

        .social-btn:hover {
            background: #f0f0f0;
        }

        .divider {
            text-align: center;
            margin: 15px 0;
            color: #777;
        }

        a {
            text-decoration: none;
            color: var(--sky-blue);
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="brand-title">OpenSky</div>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn-sky">Sign In</button>
    </form>

    <div class="text-end mt-2">
        <a href="{% url 'password_reset' %}">Forgot password?</a>
    </div>

    <div class="divider">Or continue with</div>

    <div class="d-flex justify-content-between">
        <button class="social-btn">Google</button>
        <button class="social-btn">Microsoft</button>
    </div>

    <div class="text-center mt-3">
        <a href="{% url 'admin_login' %}">Admin Login</a>
    </div>

</div>

</body>
</html>
