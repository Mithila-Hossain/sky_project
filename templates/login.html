<!DOCTYPE html>
<html lang="en">
    {% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenSky – Sign In</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --sky-orange: #ff8a00;
            --sky-pink: #ff3cac;
            --sky-purple: #784ba0;
            --sky-blue: #2b86c5;
        }

        body {
            background: url('/static/images/login_page.png') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .login-card {
            width: 400px;
            background: white;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.12);
        }

        .brand-title {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            background: linear-gradient(135deg, var(--sky-orange), var(--sky-pink), var(--sky-purple), var(--sky-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }

        .btn-sky {
            background: linear-gradient(135deg, var(--sky-orange), var(--sky-pink), var(--sky-purple), var(--sky-blue));
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            margin-top: 10px;
        }

        .btn-sky:hover {
            opacity: 0.9;
        }

        .social-btn {
            width: 48%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: white;
        }

        .social-btn:hover {
            background: #f0f0f0;
        }

        .divider {
            text-align: center;
            margin: 15px 0;
            color: #777;
        }

        a {
            text-decoration: none;
            color: var(--sky-blue);

        }

        a:hover {
            text-decoration: underline;
        }
        .admin-link {
            font-weight: 600;
            color: var(--sky-blue);
            position: relative;
            padding-bottom: 3px;
        }
        .admin-link::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(
                135deg,
                var(--sky-orange) 0%,
                var(--sky-pink) 30%,
                var(--sky-purple) 65%,
                var(--sky-blue) 100%
            );
            transition: width 0.35s ease;
            border-radius: 2px;
        }
        .admin-link:hover::after {
            width: 100%;
        }

        
    </style>
</head>

<body>

<div class="login-card">

    <div class="brand-title">Sky Engineering Portal</div>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn-sky">Sign In</button>
    </form>

    <div class="text-end mt-2">
        <a href="{% url 'password_reset' %}">Forgot password?</a>
    </div>

    <div class="text-center mt-3">
        <a href="{% url 'admin_login' %}" class="admin-link">Admin Login</a>
    </div>

</div>

</body>
</html>
