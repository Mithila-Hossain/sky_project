<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Project</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            display: flex;
            min-height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background-color: #0d6efd;
            color: white;
            padding: 20px 15px;
            position: fixed;
            top: 0;
            bottom: 0;
        }

        .sidebar h3 {
            font-weight: bold;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .sidebar a:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        /* Main content */
        .content {
            margin-left: 260px;
            padding: 30px;
            width: 100%;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>Sky Project</h3>

        <a href="/">Dashboard</a>
        <a href="/teams/">Team Management</a>
        <a href="/organisation/">Organisation</a>
        <a href="/messaging/">Messages</a>
        <a href="/schedule/">Schedule</a>
        <a href="/reports/">Reports</a>
        <a href="/visualisation/">Visualisation</a>
    </div>

    <!-- Main content -->
    <div class="content">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
