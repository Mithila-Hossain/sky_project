<!DOCTYPE html>
<html lang="en">
    {% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – Sky Engineering Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --sky-orange: #ff8a00;
            --sky-pink: #ff3cac;
            --sky-purple: #784ba0;
            --sky-blue: #2b86c5;
        }

        body {
            background:url("{% static 'images/login_page.png' %}") no-repeat center center/cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .admin-card {
            width: 420px;
            background: white;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.12);
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 25px;
            background: linear-gradient(
                135deg,
                var(--sky-orange) 0%,
                var(--sky-pink) 30%,
                var(--sky-purple) 65%,
                var(--sky-blue) 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-sky {
            background: linear-gradient(
                135deg,
                var(--sky-orange) 0%,
                var(--sky-pink) 30%,
                var(--sky-purple) 65%,
                var(--sky-blue) 100%
            );
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            margin-top: 10px;
        }

        .btn-sky:hover {
            opacity: 0.9;
        }

        /* Back link styling */
        .back-link,
        .back-link:link,
        .back-link:visited,
        .back-link:hover,
        .back-link:active,
        .back-link:focus {
            text-decoration: none !important;
            color: var(--sky-blue);
            font-weight: 600;
            position: relative;
            padding-bottom: 3px;
        }

        .back-link::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(
                135deg,
                var(--sky-orange) 0%,
                var(--sky-pink) 30%,
                var(--sky-purple) 65%,
                var(--sky-blue) 100%
            );
            transition: width 0.35s ease;
            border-radius: 2px;
        }

        .back-link:hover::after {
            width: 100%;
        }
    </style>
</head>

<body>

<div class="admin-card">

    <div class="title">Admin Portal</div>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn-sky">Login as Admin</button>
    </form>

    <div class="text-center mt-3">
        <a href="{% url 'login' %}" class="back-link">← Back to Member Login</a>
    </div>

</div>

</body>
</html>
