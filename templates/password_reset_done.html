<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Sent – OpenSky</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #F5F9FF;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .message-card {
            width: 420px;
            background: white;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.12);
            text-align: center;
        }

        .title {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #00AEEF, #6A4FBF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        a {
            color: #00AEEF;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="message-card">

    <div class="title">Check your inbox</div>

    <p class="text-muted">
        We've sent a password reset link to your email address.
    </p>

    <p class="mt-3">
        Didn’t receive the email?  
        Check your spam folder or try again in 5 minutes.
    </p>

    <a href="{% url 'login' %}" class="d-block mt-3">← Back to Login</a>

</div>

</body>
</html>
