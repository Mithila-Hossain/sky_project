<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Sent – OpenSky</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --sky-orange: #ff8a00;
            --sky-pink: #ff3cac;
            --sky-purple: #784ba0;
            --sky-blue: #2b86c5;
        }

        body {
            background: url("{% static 'images/login_page.png' %}") no-repeat center center/cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .message-card {
            width: 420px;
            background: white;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.12);
            text-align: center;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--sky-orange), var(--sky-pink), var(--sky-purple), var(--sky-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .info-text {
            color: #444;
            font-size: 15px;
            margin-bottom: 12px;
        }

        .sub-text {
            color: #666;
            font-size: 14px;
        }

        a {
            color: var(--sky-blue);
            font-weight: 600;
            text-decoration: none;
            position: relative;
            padding-bottom: 3px;
        }

        a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(
                135deg,
                var(--sky-orange) 0%,
                var(--sky-pink) 30%,
                var(--sky-purple) 65%,
                var(--sky-blue) 100%
            );
            transition: width 0.35s ease;
            border-radius: 2px;
        }

        a:hover::after {
            width: 100%;
        }
        .info-text {
            color: #333;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .sub-text {
            color: #555;
            font-size: 14px;
            line-height: 1.6;
            margin-top: 5px;
        }


    </style>
</head>

<body>

<div class="message-card">

    <div class="title">Check Your Inbox</div>

    <p class="info-text">
        We've sent a password reset link to your email address.
    </p>

    <p class="sub-text">
        Didn’t receive the email?  
        Check your spam folder or try again in a few minutes.
    </p>

    <a href="{% url 'login' %}" class="d-block mt-3">← Back to Login</a>

</div>

</body>
</html>
